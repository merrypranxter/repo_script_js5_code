<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Mycelial Crackle</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#050506}
body{display:grid;place-items:center}
canvas{max-width:100vw;max-height:100vh;width:auto;height:auto}
#hud{position:fixed;top:10px;left:10px;padding:8px 10px;background:#000b;color:white;font:12px monospace;border:1px solid #fff3;border-radius:8px}
button{margin-left:6px}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="hud">
  mycelial-crackle <span id="status">running</span>
  <button id="hide">Hide</button>
  <button id="save">Save PNG</button>
  <button id="reset">Reset</button>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const canvas = document.getElementById("canvas");
const hud = document.getElementById("hud");
const status = document.getElementById("status");

const grid = { width: 1280, height: 720 };
canvas.width = grid.width;
canvas.height = grid.height;

let ctx = canvas.getContext("webgl2", {
  alpha: true,
  antialias: true,
  preserveDrawingBuffer: true
});

let start = performance.now();
let mouse = { x:0, y:0, down:false };
let input = {};

document.getElementById("hide").onclick = () => hud.remove();
document.getElementById("save").onclick = () => {
  const a = document.createElement("a");
  a.download = "mycelial-crackle.png";
  a.href = canvas.toDataURL("image/png");
  a.click();
};
document.getElementById("reset").onclick = () => {
  start = performance.now();
  if (canvas.__three) {
    canvas.__three.renderer.dispose();
    canvas.__three.material.dispose();
    canvas.__three.geometry.dispose();
    canvas.__three = null;
  }
};

addEventListener("keydown", e => {
  input[e.key] = true;
  if (e.key.toLowerCase() === "h") hud.remove();
});
addEventListener("keyup", e => input[e.key] = false);

function runSketch(time) {
if (!canvas.__three) {
  try {
    if (!ctx) throw new Error("WebGL 2 context not available");

    const renderer = new THREE.WebGLRenderer({ canvas, context: ctx, alpha: true, antialias: true });
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
    camera.position.z = 1;

    const vertexShader = `
      out vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const fragmentShader = `
      precision highp float;

      in vec2 vUv;
      out vec4 fragColor;

      uniform float u_time;
      uniform vec2 u_resolution;

      vec2 hash2(vec2 p) {
        p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
        return fract(sin(p) * 43758.5453123);
      }

      float hash1(vec2 p) {
        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453123);
      }

      float noise(vec2 p) {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f * f * (3.0 - 2.0 * f);
        float a = hash1(i);
        float b = hash1(i + vec2(1.0, 0.0));
        float c = hash1(i + vec2(0.0, 1.0));
        float d = hash1(i + vec2(1.0, 1.0));
        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
      }

      float fbm(vec2 p) {
        float v = 0.0;
        float a = 0.5;
        for (int i = 0; i < 5; i++) {
          v += a * noise(p);
          p *= 2.0;
          a *= 0.5;
        }
        return v;
      }

      vec3 voronoi(vec2 p) {
        vec2 n = floor(p);
        vec2 f = fract(p);
        float F1 = 8.0;
        float F2 = 8.0;
        vec2 mr;
        for (int j = -1; j <= 1; j++) {
          for (int i = -1; i <= 1; i++) {
            vec2 g = vec2(float(i), float(j));
            vec2 o = hash2(n + g);
            o = 0.5 + 0.5 * sin(u_time * 0.3 + 6.2831 * o);
            vec2 r = g - f + o;
            float d = dot(r, r);
            if (d < F1) {
              F2 = F1;
              F1 = d;
              mr = r;
            } else if (d < F2) {
              F2 = d;
            }
          }
        }
        return vec3(sqrt(F1), sqrt(F2), F2 - F1);
      }

      vec3 linear_srgb_to_oklab(vec3 c) {
        float l = 0.4122214708 * c.r + 0.5363325363 * c.g + 0.0514459929 * c.b;
        float m = 0.2119034982 * c.r + 0.6806995451 * c.g + 0.1073969566 * c.b;
        float s = 0.0883024619 * c.r + 0.2817188376 * c.g + 0.6299787005 * c.b;
        float l_ = pow(max(l, 0.0), 1.0/3.0);
        float m_ = pow(max(m, 0.0), 1.0/3.0);
        float s_ = pow(max(s, 0.0), 1.0/3.0);
        return vec3(
          0.2104542553 * l_ + 0.7936177850 * m_ - 0.0040720468 * s_,
          1.9779984951 * l_ - 2.4285922050 * m_ + 0.4505937099 * s_,
          0.0259040371 * l_ + 0.7827717662 * m_ - 0.8086757660 * s_
        );
      }

      vec3 oklab_to_linear_srgb(vec3 c) {
        float l_ = c.x + 0.3963377774 * c.y + 0.2158037573 * c.z;
        float m_ = c.x - 0.1055613458 * c.y - 0.0638541728 * c.z;
        float s_ = c.x - 0.0894841775 * c.y - 1.2914855480 * c.z;
        float l = l_ * l_ * l_;
        float m = m_ * m_ * m_;
        float s = s_ * s_ * s_;
        return vec3(
           4.0767416621 * l - 3.3077115913 * m + 0.2309699292 * s,
          -1.2684380046 * l + 2.6097574011 * m - 0.3413193965 * s,
          -0.0041960863 * l - 0.7034186147 * m + 1.7076147010 * s
        );
      }

      vec3 oklab_mix(vec3 c1, vec3 c2, float t) {
        vec3 o1 = linear_srgb_to_oklab(c1);
        vec3 o2 = linear_srgb_to_oklab(c2);
        return oklab_to_linear_srgb(mix(o1, o2, t));
      }

      void main() {
        vec2 uv = vUv * 2.0 - 1.0;
        uv.x *= u_resolution.x / u_resolution.y;

        vec2 warp = vec2(
          fbm(uv * 1.5 + u_time * 0.015),
          fbm(uv * 1.5 - u_time * 0.012 + 10.0)
        );
        vec2 w_uv = uv + warp * 0.5;

        vec3 v = voronoi(w_uv * 3.0);
        vec3 v_micro = voronoi(w_uv * 15.0 - warp);

        float crack = smoothstep(0.12, 0.0, v.z);
        float micro_crack = smoothstep(0.04, 0.0, v_micro.z) * 0.8;
        float network = max(crack, micro_crack * smoothstep(0.2, 0.6, v.x));

        float thickness = v.x + fbm(uv * 25.0) * 0.2;

        float phase_c = thickness * 15.0 - u_time * 2.1;
        float phase_m = thickness * 18.0 - u_time * 3.4;
        float phase_y = thickness * 12.0 - u_time * 2.7;

        float ic = 0.5 + 0.5 * cos(phase_c);
        float im = 0.5 + 0.5 * cos(phase_m);
        float iy = 0.5 + 0.5 * cos(phase_y);

        vec3 CYAN = vec3(0.0, 1.0, 1.0);
        vec3 MAGENTA = vec3(1.0, 0.0, 1.0);
        vec3 YELLOW = vec3(1.0, 1.0, 0.0);

        vec3 structColor = oklab_mix(CYAN, MAGENTA, im);
        structColor = oklab_mix(structColor, YELLOW, iy);

        float shimmer = pow(ic * im * iy, 0.4) * 2.5;
        structColor *= 0.4 + shimmer;

        float halo = smoothstep(0.4, 0.0, v.z);
        vec3 haloColor = oklab_mix(vec3(0.0), structColor, pow(halo, 1.5) * 0.6);

        float voidNoise = fbm(w_uv * 20.0);
        vec3 voidColor = vec3(0.01 + 0.02 * voidNoise);

        vec3 finalColor = mix(voidColor, haloColor, halo);
        finalColor = mix(finalColor, structColor * 1.5, network);

        float grain = hash1(uv * (u_time + 1.0)) * 0.15;
        finalColor += grain * (network + halo * 0.5);

        finalColor = pow(clamp(finalColor, 0.0, 1.0), vec3(1.0/2.2));

        fragColor = vec4(finalColor, 1.0);
      }
    `;

    const geometry = new THREE.PlaneGeometry(2, 2);

    const material = new THREE.ShaderMaterial({
      glslVersion: THREE.GLSL3,
      uniforms: {
        u_time: { value: 0 },
        u_resolution: { value: new THREE.Vector2(grid.width, grid.height) }
      },
      vertexShader,
      fragmentShader,
      depthWrite: false,
      depthTest: false
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    canvas.__three = { renderer, scene, camera, material, geometry };
  } catch (e) {
    console.error("WebGL Initialization Failed:", e);
    return;
  }
}

const { renderer, scene, camera, material } = canvas.__three;

if (material && material.uniforms) {
  if (material.uniforms.u_time) material.uniforms.u_time.value = time;
  if (material.uniforms.u_resolution) material.uniforms.u_resolution.value.set(grid.width, grid.height);
}

renderer.setSize(grid.width, grid.height, false);
renderer.render(scene, camera);
}

function frame(now) {
  const time = (now - start) / 1000;
  try {
    runSketch(time);
    status.textContent = "running";
  } catch (err) {
    status.textContent = "error";
    console.error(err);
  }
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
