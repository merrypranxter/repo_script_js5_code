<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>doit</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{position:fixed;inset:0;display:block;width:100%!important;height:100%!important}
#hud{
  position:fixed;top:12px;left:12px;z-index:9999;
  background:rgba(0,0,0,0.82);border:1px solid #0ff;
  border-radius:4px;color:#0ff;
  font:12px/1.5 'Courier New',monospace;
  padding:8px 10px;min-width:180px;
  box-shadow:0 0 14px #0ff4;
  user-select:none;
}
#hud-name{font-size:11px;color:#fff;margin-bottom:4px;letter-spacing:1px}
#hud-status{font-size:10px;color:#0ff9;margin-bottom:6px;min-height:14px;word-break:break-word}
#hud-btns{display:flex;gap:5px;flex-wrap:wrap}
#hud-btns button{
  background:none;border:1px solid #0ff6;color:#0ff;
  font:11px 'Courier New',monospace;padding:2px 7px;
  border-radius:2px;cursor:pointer;
}
#hud-btns button:hover{background:#0ff2;border-color:#0ff}
</style>

</head>
<body>
<canvas id="art"></canvas>
<div id="hud">
  <div id="hud-name">doit.js</div>
  <div id="hud-status">loading…</div>
  <div id="hud-btns">
    <button id="btn-hide">Hide</button>
    <button id="btn-save">Save PNG</button>
    <button id="btn-reset">Reset</button>
  </div>
</div>
<script>
(function(){
  'use strict';

  // ── Globals ──────────────────────────────────────────────────────────────
  const canvas = document.getElementById('art');
  const grid   = { width: 0, height: 0 };
  let   time   = 0;
  const mouse  = { x: 0, y: 0, isPressed: false, pressed: false, down: false };
  let   input  = '';
  const THREE_GLOBAL = null;

  // ── Canvas / context ─────────────────────────────────────────────────────
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const CTX_TYPE = '2d';
  let ctx = null;

  function initContext() {
    ctx = canvas.getContext(CTX_TYPE, {});
  }

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width  = Math.round(w * DPR);
    canvas.height = Math.round(h * DPR);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    grid.width  = canvas.width;
    grid.height = canvas.height;
  }

  initContext();
  resize();
  window.addEventListener('resize', resize);

  // ── Mouse / Touch ─────────────────────────────────────────────────────────
  function updateMouse(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / r.width;
    const scaleY = canvas.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    mouse.x = (src.clientX - r.left) * scaleX;
    mouse.y = (src.clientY - r.top)  * scaleY;
  }
  canvas.addEventListener('mousedown',  e => { updateMouse(e); mouse.isPressed = true; mouse.pressed = true; mouse.down = true; });
  canvas.addEventListener('mousemove',  e => { updateMouse(e); });
  canvas.addEventListener('mouseup',    ()=> { mouse.isPressed = false; mouse.pressed = false; mouse.down = false; });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); updateMouse(e); mouse.isPressed = true; mouse.pressed = true; mouse.down = true; }, {passive:false});
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); updateMouse(e); }, {passive:false});
  canvas.addEventListener('touchend',   ()=> { mouse.isPressed = false; mouse.pressed = false; mouse.down = false; });

  // ── Keyboard input ───────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    if (e.key === 'H' || e.key === 'h') { removeHud(); return; }
    if (e.key.length === 1) input += e.key;
    else if (e.key === 'Backspace') input = input.slice(0, -1);
  });

  // ── HUD ──────────────────────────────────────────────────────────────────
  const hud       = document.getElementById('hud');
  const statusEl  = document.getElementById('hud-status');

  function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }
  function removeHud()    { if (hud && hud.parentNode) hud.parentNode.removeChild(hud); }

  document.getElementById('btn-hide').addEventListener('click', removeHud);

  document.getElementById('btn-save').addEventListener('click', function() {
    try {
      const a = document.createElement('a');
      a.href     = canvas.toDataURL('image/png');
      a.download = 'doit.png';
      a.click();
    } catch(e) { setStatus('save failed: ' + e.message); }
  });

  document.getElementById('btn-reset').addEventListener('click', resetSketch);

  // ── Sketch source (base64) ────────────────────────────────────────────────
  const _b64 = 'Y29uc3Qgb3V0ID0gW107CmNvbnN0IGNlbGxXID0gODsKY29uc3QgY2VsbEggPSAxNjsgCmNvbnN0IGN4ID0gKGdyaWQuY29scyAqIGNlbGxXKSAvIDI7CmNvbnN0IGN5ID0gKGdyaWQucm93cyAqIGNlbGxIKSAvIDI7Cgpjb25zdCBnbGl0Y2hDaGFycyA9IFsnIycsICdAJywgJyUnLCAnWCcsICchJywgJz8nLCAn4paIJywgJ+KWkycsICfilpInLCAn4paRJywgJ8KlJywgJ8KnJywgJ8K2JywgJ+KIhiddOwpjb25zdCB5MmtXb3JkcyA9IFsiWTJLX0FFU1RIRVRJQyIsICJERUFEX1dFQiIsICJNWVNQQUNFX1NDRU5FIiwgIk9QX0FSVCIsICJSRVRJTkFMIiwgIkdMSVRDSENPUkUiLCAiU1lTX0VSUiIsICI0MDRfTk9UX0ZPVU5EIiwgIjxIVE1MPiIsICJDVVJTRURfU0hJVFBPU1QiXTsKCmZvciAobGV0IHkgPSAwOyB5IDwgZ3JpZC5yb3dzOyB5KyspIHsKICBjb25zdCByb3cgPSBbXTsKICAKICBjb25zdCByb3dHbGl0Y2ggPSBNYXRoLnNpbih5ICogMC4zICsgdGltZSAqIDgpID4gMC45ODsKICBjb25zdCByb3dPZmZzZXQgPSByb3dHbGl0Y2ggPyBNYXRoLmZsb29yKE1hdGguc2luKHRpbWUgKiAyMCkgKiAxMCkgOiAwOwogIAogIGZvciAobGV0IHggPSAwOyB4IDwgZ3JpZC5jb2xzOyB4KyspIHsKICAgIGNvbnN0IGVmZlggPSB4ICsgcm93T2Zmc2V0OwogICAgbGV0IHB4ID0gZWZmWCAqIGNlbGxXOwogICAgbGV0IHB5ID0geSAqIGNlbGxIOwogICAgCiAgICBjb25zdCBkaXN0b3J0aW9uID0gTWF0aC5zaW4ocHkgKiAwLjA1ICsgdGltZSkgKiAxNTsKICAgIHB4ICs9IGRpc3RvcnRpb247CiAgICAKICAgIGNvbnN0IGR4ID0gcHggLSBjeDsKICAgIGNvbnN0IGR5ID0gcHkgLSBjeTsKICAgIGNvbnN0IGRDZW50ZXIgPSBNYXRoLnNxcnQoZHgqZHggKyBkeSpkeSk7CiAgICBjb25zdCBhbmdsZUNlbnRlciA9IE1hdGguYXRhbjIoZHksIGR4KTsKICAgIAogICAgY29uc3QgbWR4ID0gcHggLSBtb3VzZS54OwogICAgY29uc3QgbWR5ID0gcHkgLSBtb3VzZS55OwogICAgY29uc3QgZE1vdXNlID0gTWF0aC5zcXJ0KG1keCptZHggKyBtZHkqbWR5KTsKICAgIAogICAgY29uc3Qgd2F2ZTEgPSBNYXRoLmNvcyhkQ2VudGVyICogMC4wOCAtIHRpbWUgKiAzKTsKICAgIGNvbnN0IHdhdmUyID0gTWF0aC5jb3MoZE1vdXNlICogMC4xMiArIHRpbWUgKiAyKTsKICAgIGNvbnN0IHJhZGlhbCA9IE1hdGguc2luKGFuZ2xlQ2VudGVyICogMTYgKyB0aW1lICogMS41KTsKICAgIAogICAgbGV0IGludGVyZmVyZW5jZSA9IHdhdmUxICogd2F2ZTIgKyByYWRpYWwgKiAwLjQ7CiAgICAKICAgIGxldCBzaXplID0gMTI7CiAgICBpZiAoZE1vdXNlIDwgMTgwKSB7CiAgICAgIGNvbnN0IGxlbnMgPSAoMTgwIC0gZE1vdXNlKSAvIDE4MDsKICAgICAgaW50ZXJmZXJlbmNlICs9IE1hdGguc2luKGRNb3VzZSAqIDAuMiAtIHRpbWUgKiA1KSAqIGxlbnM7CiAgICAgIHNpemUgKz0gbGVucyAqIDE0OyAKICAgIH0KICAgIAogICAgbGV0IGNoYXIgPSAnICc7CiAg   const source = decodeURIComponent(escape(atob(_b64)));

  // ── Compile sketch ────────────────────────────────────────────────────────
  let sketchFn = null;
  try {
    sketchFn = new Function('canvas','ctx','grid','time','mouse','input','THREE', source + '\n');
    setStatus('ok');
  } catch(e) {
    setStatus('compile error: ' + e.message);
    console.error('[doit] compile error:', e);
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function resetSketch() {
    try {
      // Dispose Three.js renderer if present
      if (canvas.__three) {
        const t = canvas.__three;
        if (t.renderer) { try { t.renderer.dispose(); } catch(_){} }
        if (t.rtA)      { try { t.rtA.dispose(); }      catch(_){} }
        if (t.rtB)      { try { t.rtB.dispose(); }      catch(_){} }
        if (t.material) { try { t.material.dispose(); } catch(_){} }
        delete canvas.__three;
      }
      // Clear any other custom state
      for (const k of Object.keys(canvas)) {
        if (k.startsWith('__')) { try { delete canvas[k]; } catch(_){} }
      }
      // Clear Canvas2D if applicable
      if (CTX_TYPE === '2d' && ctx) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      // Reset context after dispose
      initContext();
      startTime = performance.now();
      setStatus('reset ok');
    } catch(e) {
      setStatus('reset error: ' + e.message);
    }
  }

  // ── Animation loop ────────────────────────────────────────────────────────
  let startTime = performance.now();

  function frame() {
    time = (performance.now() - startTime) / 1000;
    mouse.pressed = false; // single-frame pulse reset
    if (sketchFn) {
      try {
        sketchFn(canvas, ctx, grid, time, mouse, input, THREE_GLOBAL);
      } catch(e) {
        setStatus('runtime error: ' + e.message);
        console.error('[doit] runtime error:', e);
      }
    }
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
