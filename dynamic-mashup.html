<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dynamic-mashup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{position:fixed;inset:0;display:block;width:100%!important;height:100%!important}
#hud{
  position:fixed;top:12px;left:12px;z-index:9999;
  background:rgba(0,0,0,0.82);border:1px solid #0ff;
  border-radius:4px;color:#0ff;
  font:12px/1.5 'Courier New',monospace;
  padding:8px 10px;min-width:180px;
  box-shadow:0 0 14px #0ff4;
  user-select:none;
}
#hud-name{font-size:11px;color:#fff;margin-bottom:4px;letter-spacing:1px}
#hud-status{font-size:10px;color:#0ff9;margin-bottom:6px;min-height:14px;word-break:break-word}
#hud-btns{display:flex;gap:5px;flex-wrap:wrap}
#hud-btns button{
  background:none;border:1px solid #0ff6;color:#0ff;
  font:11px 'Courier New',monospace;padding:2px 7px;
  border-radius:2px;cursor:pointer;
}
#hud-btns button:hover{background:#0ff2;border-color:#0ff}
</style>

</head>
<body>
<canvas id="art"></canvas>
<div id="hud">
  <div id="hud-name">dynamic-mashup.js</div>
  <div id="hud-status">loading…</div>
  <div id="hud-btns">
    <button id="btn-hide">Hide</button>
    <button id="btn-save">Save PNG</button>
    <button id="btn-reset">Reset</button>
  </div>
</div>
<script>
(function(){
  'use strict';

  // ── Globals ──────────────────────────────────────────────────────────────
  const canvas = document.getElementById('art');
  const grid   = { width: 0, height: 0 };
  let   time   = 0;
  const mouse  = { x: 0, y: 0, isPressed: false, pressed: false, down: false };
  let   input  = '';
  const THREE_GLOBAL = null;

  // ── Canvas / context ─────────────────────────────────────────────────────
  const DPR = Math.min(window.devicePixelRatio || 1, 2);
  const CTX_TYPE = '2d';
  let ctx = null;

  function initContext() {
    ctx = canvas.getContext(CTX_TYPE, {});
  }

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    canvas.width  = Math.round(w * DPR);
    canvas.height = Math.round(h * DPR);
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    grid.width  = canvas.width;
    grid.height = canvas.height;
  }

  initContext();
  resize();
  window.addEventListener('resize', resize);

  // ── Mouse / Touch ─────────────────────────────────────────────────────────
  function updateMouse(e) {
    const r = canvas.getBoundingClientRect();
    const scaleX = canvas.width  / r.width;
    const scaleY = canvas.height / r.height;
    const src = e.touches ? e.touches[0] : e;
    mouse.x = (src.clientX - r.left) * scaleX;
    mouse.y = (src.clientY - r.top)  * scaleY;
  }
  canvas.addEventListener('mousedown',  e => { updateMouse(e); mouse.isPressed = true; mouse.pressed = true; mouse.down = true; });
  canvas.addEventListener('mousemove',  e => { updateMouse(e); });
  canvas.addEventListener('mouseup',    ()=> { mouse.isPressed = false; mouse.pressed = false; mouse.down = false; });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); updateMouse(e); mouse.isPressed = true; mouse.pressed = true; mouse.down = true; }, {passive:false});
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); updateMouse(e); }, {passive:false});
  canvas.addEventListener('touchend',   ()=> { mouse.isPressed = false; mouse.pressed = false; mouse.down = false; });

  // ── Keyboard input ───────────────────────────────────────────────────────
  window.addEventListener('keydown', e => {
    if (e.key === 'H' || e.key === 'h') { removeHud(); return; }
    if (e.key.length === 1) input += e.key;
    else if (e.key === 'Backspace') input = input.slice(0, -1);
  });

  // ── HUD ──────────────────────────────────────────────────────────────────
  const hud       = document.getElementById('hud');
  const statusEl  = document.getElementById('hud-status');

  function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }
  function removeHud()    { if (hud && hud.parentNode) hud.parentNode.removeChild(hud); }

  document.getElementById('btn-hide').addEventListener('click', removeHud);

  document.getElementById('btn-save').addEventListener('click', function() {
    try {
      const a = document.createElement('a');
      a.href     = canvas.toDataURL('image/png');
      a.download = 'dynamic-mashup.png';
      a.click();
    } catch(e) { setStatus('save failed: ' + e.message); }
  });

  document.getElementById('btn-reset').addEventListener('click', resetSketch);

  // ── Sketch source (base64) ────────────────────────────────────────────────
  const _b64 = 'Y29uc3Qgb3V0cHV0ID0gW107CmNvbnN0IGN4ID0gZ3JpZC5jb2xzIC8gMjsKY29uc3QgY3kgPSBncmlkLnJvd3MgLyAyOwoKY29uc3Qgcm9jb2NvID0gWyfCpycsICcmJywgJ34nLCAnKCcsICcpJywgJ3snLCAnfScsICdjJywgJ2UnLCAncycsICd6J107CmNvbnN0IHBzeWNoUG9wID0gWycqJywgJ08nLCAnQCcsICdvJywgJzAnLCAnUScsICdDJywgJ0cnXTsKY29uc3Qgc2hvZWdhemUgPSBbJy4nLCAnLCcsICc6JywgJzsnLCAnYCcsICdcJyddOwpjb25zdCBkcmVhbUdsaXRjaCA9IFsnPycsICchJywgJyMnLCAnJScsICdeJywgJz4nLCAnPCcsICc9JywgJysnLCAnLSddOwoKZm9yIChsZXQgeSA9IDA7IHkgPCBncmlkLnJvd3M7IHkrKykgewogICAgY29uc3Qgcm93ID0gW107CiAgICBmb3IgKGxldCB4ID0gMDsgeCA8IGdyaWQuY29sczsgeCsrKSB7CiAgICAgICAgbGV0IGR4ID0geCAtIGN4OwogICAgICAgIGxldCBkeSA9ICh5IC0gY3kpICogMi4yOyAKICAgICAgICAKICAgICAgICBsZXQgbnggPSBkeCAvIGdyaWQuY29sczsKICAgICAgICBsZXQgbnkgPSBkeSAvIGdyaWQucm93czsKICAgICAgICAKICAgICAgICBsZXQgbXggPSBtb3VzZS54IC0gY3g7CiAgICAgICAgbGV0IG15ID0gKG1vdXNlLnkgLSBjeSkgKiAyLjI7CiAgICAgICAgbGV0IG1keCA9IGR4IC0gbXg7CiAgICAgICAgbGV0IG1keSA9IGR5IC0gbXk7CiAgICAgICAgbGV0IG1EaXN0ID0gTWF0aC5zcXJ0KG1keCAqIG1keCArIG1keSAqIG1keSk7CiAgICAgICAgbGV0IG1EaXN0Tm9ybSA9IG1EaXN0IC8gZ3JpZC5jb2xzOwogICAgICAgIAogICAgICAgIGlmIChtb3VzZS5pc1ByZXNzZWQpIHsKICAgICAgICAgICAgbnggKz0gTWF0aC5zaW4obURpc3ROb3JtICogMjAgLSB0aW1lICogNSkgKiAwLjA1OwogICAgICAgICAgICBueSArPSBNYXRoLmNvcyhtRGlzdE5vcm0gKiAyMCAtIHRpbWUgKiA1KSAqIDAuMDU7CiAgICAgICAgfQoKICAgICAgICBsZXQgciA9IE1hdGguc3FydChueCAqIG54ICsgbnkgKiBueSk7CiAgICAgICAgbGV0IHRoZXRhID0gTWF0aC5hdGFuMihueSwgbngpOwogICAgICAgIAogICAgICAgIGxldCByMiA9IE1hdGguc3FydChNYXRoLnBvdyhueCAtIDAuMiwgMikgKyBNYXRoLnBvdyhueSAtIDAuMiwgMikpOwogICAgICAgIGxldCBtb2lyZSA9IE1hdGguc2luKHIgKiA1MCAtIHRpbWUgKiA0KSArIE1hdGguc2luKHIyICogNTAgKyB0aW1lICogMik7CiAgICAgICAgbGV0IG9wV2F2ZSA9IE1hdGguc2luKG1vaXJlICogTWF0aC5QSSkgKiBNYXRoLmNvcyh0aGV0YSAqIDYgKyB0aW1lKTsKICAgICAgICAKICAgICAgICBsZXQgbm9pc2VWYWwgPSBNYXRoLnJhbmRvbSgpOwogICAgICAgIAogICAgICAgIGxldCBodWUgPSAodGhldGEgKiAxODAgLyBNYXRoLlBJICsgciAqIDMwMCAtIHRpbWUgKiA1MCkgJSAzNjA7CiAgICAgICAgaWYgKGh1ZSA8IDApIGh1ZSArPSAzNjA7CiAgICAgICAgbGV0IHNhdCA9IDgwICsgTWF0aC5zaW4odGlt   const source = decodeURIComponent(escape(atob(_b64)));

  // ── Compile sketch ────────────────────────────────────────────────────────
  let sketchFn = null;
  try {
    sketchFn = new Function('canvas','ctx','grid','time','mouse','input','THREE', source + '\n');
    setStatus('ok');
  } catch(e) {
    setStatus('compile error: ' + e.message);
    console.error('[dynamic-mashup] compile error:', e);
  }

  // ── Reset ─────────────────────────────────────────────────────────────────
  function resetSketch() {
    try {
      // Dispose Three.js renderer if present
      if (canvas.__three) {
        const t = canvas.__three;
        if (t.renderer) { try { t.renderer.dispose(); } catch(_){} }
        if (t.rtA)      { try { t.rtA.dispose(); }      catch(_){} }
        if (t.rtB)      { try { t.rtB.dispose(); }      catch(_){} }
        if (t.material) { try { t.material.dispose(); } catch(_){} }
        delete canvas.__three;
      }
      // Clear any other custom state
      for (const k of Object.keys(canvas)) {
        if (k.startsWith('__')) { try { delete canvas[k]; } catch(_){} }
      }
      // Clear Canvas2D if applicable
      if (CTX_TYPE === '2d' && ctx) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
      // Reset context after dispose
      initContext();
      startTime = performance.now();
      setStatus('reset ok');
    } catch(e) {
      setStatus('reset error: ' + e.message);
    }
  }

  // ── Animation loop ────────────────────────────────────────────────────────
  let startTime = performance.now();

  function frame() {
    time = (performance.now() - startTime) / 1000;
    mouse.pressed = false; // single-frame pulse reset
    if (sketchFn) {
      try {
        sketchFn(canvas, ctx, grid, time, mouse, input, THREE_GLOBAL);
      } catch(e) {
        setStatus('runtime error: ' + e.message);
        console.error('[dynamic-mashup] runtime error:', e);
      }
    }
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
