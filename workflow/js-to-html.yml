name: JS → HTML Auto-Convert

on:
  push:
    branches: [main]
    paths:
      - '**.js'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed .js files
        id: changed
        run: |
          git diff --name-only HEAD~1 HEAD -- '*.js' | grep -v '^\.github/' > changed_js.txt || true
          echo "Changed JS files:"
          cat changed_js.txt

      - name: Convert JS → HTML
        run: |
          while IFS= read -r jsfile; do
            [ -z "$jsfile" ] && continue
            [ -f "$jsfile" ] || continue
            echo "Converting: $jsfile"
            python3 .github/scripts/convert_js_to_html.py "$jsfile"
          done < changed_js.txt

      - name: Commit HTML files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          git diff --staged --quiet || git commit -m "auto: generate HTML for changed .js files [skip ci]"
          git push
